<!DOCTYPE html>
<html>
<head>
  <title>Cadastro de Pacientes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 420px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      text-align: left;
    }

    .acoes button {
      width: auto;
      padding: 6px 10px;
      margin-right: 5px;
    }

    .edit {
      background: #2196F3;
    }

    .del {
      background: #e53935;
    }

    #mensagem {
      display: none;
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Pacientes</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="celular" placeholder="Celular" required>
    <input type="email" id="email" placeholder="Email" required>

    <button type="submit">Cadastrar</button>
  </form>

  <div id="mensagem">Usuário cadastrado com sucesso!</div>

  <h3>Pacientes</h3>
  <div id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
