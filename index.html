<!DOCTYPE html>
<html>
<head>
  <title>Cadastro de Pacientes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #45a049;
    }

    #mensagem {
      margin-top: 15px;
      color: green;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Cadastro de Pacientes</h2>

    <form id="form">
      <input type="text" id="nome" placeholder="nome" required>
      <input type="text" id="celular" placeholder="celular" required>
      <input type="email" id="email" placeholder="email" required>

      <button type="submit">Cadastrar</button>
    </form>

    <div id="mensagem">Usuário cadastrado com sucesso!</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="script.js"></script>

</body>
</html>
